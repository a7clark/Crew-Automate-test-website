<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crew Automate — Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:    #080807;
    --text:  #F0EDE8;
    --gold:  #A8874A;
    --stone: #8C7B68;
    --muted: #3A3937;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
  }

  /* ─── LOGO COMPONENT ─── */
  .logo {
    display: inline-flex;
    align-items: center;
    gap: 20px;
    text-decoration: none;
    user-select: none;
  }
  .logo-text {
    display: flex;
    flex-direction: column;
    gap: 3px;
    line-height: 1;
  }
  .logo-crew {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 26px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text, #F0EDE8);
  }
  .logo-automate {
    font-family: 'Syne', sans-serif;
    font-weight: 400;
    font-size: 10px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--stone, #8C7B68);
  }

  /* ─── Mark animations ─── */
  .mark-outer { transform-origin: 24px 24px; animation: spin-cw 22s linear infinite; }
  .mark-inner { transform-origin: 24px 24px; animation: spin-ccw 14s linear infinite; }
  @keyframes spin-cw  { to { transform: rotate(360deg); } }
  @keyframes spin-ccw { to { transform: rotate(-360deg); } }

  /* ─── LAYOUT ─── */
  .slab {
    padding: 72px 80px;
  }
  .slab--dark  { background: var(--bg); }
  .slab--mid   { background: #111110; }
  .slab--light { background: #F5F2ED; }

  .slab-label {
    font-size: 9px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 40px;
  }
  .slab--light .slab-label { color: #b0a090; }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(168,135,74,.2) 30%, rgba(168,135,74,.2) 70%, transparent);
    margin: 48px 0;
  }
  .slab--light .divider {
    background: linear-gradient(to right, transparent, rgba(139,106,53,.2) 30%, rgba(139,106,53,.2) 70%, transparent);
  }

  /* Hero primary lockup */
  .hero-lockup {
    display: flex;
    align-items: center;
    gap: 28px;
    margin-bottom: 8px;
  }
  .hero-lockup .logo-crew    { font-size: 40px; letter-spacing: 0.22em; }
  .hero-lockup .logo-automate { font-size: 13px; letter-spacing: 0.5em; }
  .hero-lockup .logo-text    { gap: 6px; }

  /* Size row */
  .size-row {
    display: flex;
    align-items: flex-end;
    gap: 52px;
    flex-wrap: wrap;
  }

  /* sm / default / lg convenience classes */
  .logo--sm .logo-crew     { font-size: 17px; letter-spacing: 0.18em; }
  .logo--sm .logo-automate { font-size: 8px; letter-spacing: 0.4em; }
  .logo--sm                { gap: 13px; }

  .logo--md .logo-crew     { font-size: 24px; }
  .logo--md .logo-automate { font-size: 10px; }
  .logo--md                { gap: 18px; }

  /* Gold mono */
  .logo--gold .logo-crew     { color: var(--gold, #A8874A); }
  .logo--gold .logo-automate { color: var(--gold, #A8874A); opacity: 0.55; }

  /* Light theme overrides */
  .on-light .logo-crew     { color: #1A1917; }
  .on-light .logo-automate { color: #6B5C4E; }

  /* Stacked */
  .logo--stacked {
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .logo--stacked .logo-text { align-items: center; gap: 5px; }

  /* Variants row */
  .variant-row {
    display: flex;
    align-items: center;
    gap: 72px;
    flex-wrap: wrap;
  }

  /* Mark-only grid */
  .mark-row {
    display: flex;
    align-items: flex-end;
    gap: 36px;
    flex-wrap: wrap;
  }
</style>
</head>
<body>
